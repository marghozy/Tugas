        return scores[tier] || 50;
      }

      function getMedalGroup(tier) {
        if (tier === 'SS' || tier === 'S') return 'GOLD';
        if (tier === 'A' || tier === 'B') return 'SILVER';
        if (tier === 'C' || tier === 'D') return 'BRONZE';
        return 'BRONZE';
      }

      function getMedal(tier) {
        if (tier === 'SS' || tier === 'S') return '🥇';
        if (tier === 'A' || tier === 'B') return '🥈';
        if (tier === 'C' || tier === 'D') return '🥉';
        return '';
      }

      function getTierSortValue(tier) {
        const vals = { 'SS': 6, 'S': 5, 'A': 4, 'B': 3, 'C': 2, 'D': 1 };
        return vals[tier] || 0;
      }

      function getCompatibility(heroRole, slotRole) {
        // Logika warna untuk hero yang punya peran ganda (misal: "Roam/EXP")
        const roles = heroRole.split('/').map(r => r.trim());
        if (roles[0] === slotRole) return 'perfect'; // Jika ditempatkan di role utama (Hijau)
        if (roles.length > 1 && roles[1] === slotRole) return 'ok'; // Jika di role kedua (Kuning)
        return 'bad'; // Jika ditempatkan di luar rolenya (Merah)
      }

        if (comp === 'perfect') return '#10b981';
        if (comp === 'ok') return '#facc15';
        return '#ef4444';
      }

      function shuffleArray(array) { return [...array].sort(() => Math.random() - 0.5); }

      function startRound() {
        if (currentRound > 5) {
            if (!finalRosterInitialized) {
                finalRoster['EXP'] = myDraft[0];
                finalRoster['Jungle'] = myDraft[1];
                finalRoster['Mid'] = myDraft[2];
                finalRoster['Gold'] = myDraft[3];
                finalRoster['Roam'] = myDraft[4];
                finalRosterInitialized = true;
            }
            gameState = 'final-result'; 
            render(); 
            return;
        }

        // Filter hero yang sudah masuk ke draft permanen
        let freshHeroes = MLBB_HEROES.filter(h => !usedGlobalHeroes.includes(h.name));
        
        let poolGold = shuffleArray(freshHeroes.filter(h => ['SS', 'S'].includes(h.tier)));
        let poolSilver = shuffleArray(freshHeroes.filter(h => ['A', 'B'].includes(h.tier)));
        let poolBronze = shuffleArray(freshHeroes.filter(h => ['C', 'D'].includes(h.tier)));
        
        let targetHeroes = [];
        // Memastikan kemunculan hero SS/S (Gold) lebih stabil
        targetHeroes.push(...poolGold.splice(0, Math.min(3, poolGold.length)));
        targetHeroes.push(...poolSilver.splice(0, Math.min(3, poolSilver.length)));
        targetHeroes.push(...poolBronze.splice(0, Math.min(4, poolBronze.length)));
        
        // Memastikan koper genap 10 jika ada yang kurang
        while (targetHeroes.length < 10) {
            let fallbackPool = shuffleArray(freshHeroes.filter(h => !targetHeroes.some(th => th.name === h.name)));
            if(fallbackPool.length === 0) break;
            targetHeroes.push(fallbackPool.pop());
        }
        
        const roundHeroes = shuffleArray(targetHeroes);
        roundHeroNames = roundHeroes.map(h => h.name); 

        cases = roundHeroes.map((hero, idx) => ({ id: idx + 1, player: hero, isOpened: false }));
        
        openedCases = []; selectedCase = null; bankerOffer = null; roundHeroFinal = null; latestEliminatedBatch = [];
        gameState = 'pick-own';
        render();
      }

      function handleCaseClick(caseId) {
        if (gameState === 'pick-own') {
          selectedCase = caseId; gameState = 'opening-3-1'; render(); return;
        }

        if (['opening-3-1', 'opening-3-2', 'opening-1-1', 'opening-1-2'].includes(gameState) && caseId !== selectedCase && !openedCases.includes(caseId)) {
          openedCases.push(caseId);
          const eliminatedPlayer = cases.find(c => c.id === caseId).player;
          latestEliminatedBatch.push(eliminatedPlayer); 

          if (gameState === 'opening-3-1' && openedCases.length === 3) { generateBankerOffer(1); gameState = 'banker-offer-1'; } 
          else if (gameState === 'opening-3-2' && openedCases.length === 6) { generateBankerOffer(2); gameState = 'banker-offer-2'; } 
          else if (gameState === 'opening-1-1' && openedCases.length === 7) { generateBankerOffer(3); gameState = 'banker-offer-3'; } 
          else if (gameState === 'opening-1-2' && openedCases.length === 8) { gameState = 'switch-decision'; }
          render();
        }
      }

      function generateBankerOffer(offerNumber) {
        // Tentukan medali koper utama
        const myCase = cases.find(c => c.id === selectedCase);
        const myCaseMedalGroup = getMedalGroup(myCase.player.tier);
        
        let targetGroup = 'BRONZE';

        // LOGIKA PENAWARAN BANKER (GAMBLING)
        if (myCaseMedalGroup === 'GOLD') {
            if (offerNumber === 1) targetGroup = 'SILVER';
            else if (offerNumber === 2) targetGroup = 'GOLD';
            else if (offerNumber === 3) targetGroup = 'GOLD';
        } else if (myCaseMedalGroup === 'SILVER') {
            if (offerNumber === 1) targetGroup = 'BRONZE';
            else if (offerNumber === 2) targetGroup = 'SILVER';
            else if (offerNumber === 3) targetGroup = 'SILVER';
        } else { // BRONZE
            targetGroup = 'BRONZE';
        }

        let targetTiers = [];
        if (targetGroup === 'GOLD') targetTiers = ['SS', 'S'];
        else if (targetGroup === 'SILVER') targetTiers = ['A', 'B'];
        else targetTiers = ['C', 'D'];

        let freshHeroes = MLBB_HEROES.filter(h => !usedGlobalHeroes.includes(h.name));
        
        // Filter hero yang sesuai dengan target tier
        let availableOffers = freshHeroes.filter(h => targetTiers.includes(h.tier) && !roundHeroNames.includes(h.name));
        
        // PENCEGAH KEGAGALAN: Jika di pool sisa koper (roundHeroNames) ada yang lebih baik/sesuai,
        // tapi di pool freshHeroes sudah habis, maka Banker akan menawarkan apa yang masih benar-benar 
        // masuk akal di sisa koper game ini.
        if (availableOffers.length === 0) {
             const remainingCases = cases.filter(c => !openedCases.includes(c.id));
             
             // Coba cari koper yang setara dengan targetGroup di sisa koper (selain punya kita)
             let fallbackFromRemaining = remainingCases.filter(c => targetTiers.includes(c.player.tier) && c.id !== selectedCase);
             
             if (fallbackFromRemaining.length > 0) {
                 availableOffers = fallbackFromRemaining.map(c => c.player);
             } else {
                 // Jika tidak ada sama sekali yang cocok, Banker offer hero acak dari sisa koper 
                 // yang menduduki rank paling tinggi saat itu
                 let highestRemaining = [...remainingCases].sort((a,b) => getTierSortValue(b.player.tier) - getTierSortValue(a.player.tier));
                 availableOffers = [highestRemaining[0].player];
             }
        }
        
        bankerOffer = shuffleArray(availableOffers)[0];
      }

      function acceptDeal() { roundHeroFinal = bankerOffer; finishRound(); }
      
      function rejectDeal() {
        latestEliminatedBatch = []; 
        if (gameState === 'banker-offer-1') gameState = 'opening-3-2';
        else if (gameState === 'banker-offer-2') gameState = 'opening-1-1';
        else if (gameState === 'banker-offer-3') gameState = 'opening-1-2';
        render();
      }

      function switchCase() {
        const otherCase = cases.find(c => c.id !== selectedCase && !openedCases.includes(c.id));
        roundHeroFinal = otherCase.player; finishRound();
      }

      function keepCase() {
        const myCase = cases.find(c => c.id === selectedCase);
        roundHeroFinal = myCase.player; finishRound();
      }

      function finishRound() {
        myDraft.push(roundHeroFinal);
        
        // Kunci hero ini dari global pool (Tidak akan pernah muncul lagi di ronde berikutnya)
        usedGlobalHeroes.push(roundHeroFinal.name); 
        
        gameState = 'round-result';
        render();
      }

      function nextRound() { currentRound++; startRound(); }

      function handleDragStart(slot) { draggedSlot = slot; }
      function handleDragOver(e) { e.preventDefault(); }
      function handleDrop(e, targetSlot) {
        e.preventDefault();
        if (draggedSlot && draggedSlot !== targetSlot) {
            const temp = finalRoster[draggedSlot];
            finalRoster[draggedSlot] = finalRoster[targetSlot];
            finalRoster[targetSlot] = temp;
            render();
        }
        draggedSlot = null;
      }
      function handleSlotTap(slot) {
        if (!selectedSlotForSwap) {
            selectedSlotForSwap = slot;
        } else if (selectedSlotForSwap === slot) {
            selectedSlotForSwap = null;
        } else {
            const temp = finalRoster[selectedSlotForSwap];
            finalRoster[selectedSlotForSwap] = finalRoster[slot];
            finalRoster[slot] = temp;
            selectedSlotForSwap = null;
        }
        render();
      }

      function renderAllHeroesSection() {
        const sortedCases = [...cases].sort((a,b) => {
            let tA = getTierSortValue(a.player.tier);
            let tB = getTierSortValue(b.player.tier);
            if(tB !== tA) return tB - tA;
            return a.player.name.localeCompare(b.player.name);
        });

        let html = `
        <div class="players-section">
            <h3>📋 All Players in This Game</h3>
            <div class="players-grid">
        `;
        
        sortedCases.forEach(c => {
            const isElim = openedCases.includes(c.id);
            const isDrafted = (gameState === 'round-result' && c.player.name === roundHeroFinal.name);
            const isOriginal = (c.id === selectedCase);
            
            let cardClass = isElim && !isDrafted ? 'eliminated' : '';
            let extraStyle = '';
            
            if (isDrafted) {
                extraStyle = 'border-color:#10b981; background:rgba(16,185,129,0.15); box-shadow:0 0 15px rgba(16,185,129,0.2);';
            }

            html += `
            <div class="player-card ${cardClass}" style="${extraStyle}">
                <div class="p-name">${getMedal(c.player.tier)} ${c.player.name}</div>
                <div class="p-role">${c.player.role}</div>
                ${isElim && !isDrafted ? '<div class="elim-badge" style="color:#ef4444;">❌ ELIMINATED</div>' : ''}
                ${isDrafted ? '<div class="elim-badge" style="color:#10b981; border-top-color:rgba(16,185,129,0.2);">✨ DRAFTED</div>' : ''}
                ${isOriginal && !isDrafted && gameState === 'round-result' ? '<div class="elim-badge" style="color:#f59e0b; border-top-color:rgba(245,158,11,0.2);">🎁 ORIGINAL CASE</div>' : ''}
            </div>
            `;
        });
        
        html += `</div></div>`;
        return html;
      }

      function render() {
        const root = document.getElementById('root');
        let html = '';

        if (gameState !== 'final-result') {
          html += `
            <div class="header">
              <div class="title">MLBB DRAFT CHALLENGE</div>
              <button class="btn-reset" onclick="location.reload()">Restart Game</button>
            </div>
            
            <div class="round-indicator">
              <div class="round-badge">ROUND ${currentRound}</div>
            </div>

            <div class="draft-progress">
              ${[0,1,2,3,4].map((idx) => `
                <div class="draft-slot ${idx === currentRound - 1 ? 'active' : ''} ${myDraft[idx] ? 'filled' : ''}">
                  <div class="slot-role">SLOT ${idx + 1}</div>
                  <div class="slot-hero">${myDraft[idx] ? `${getMedal(myDraft[idx].tier)} ${myDraft[idx].name}` : '???'}</div>
                </div>
              `).join('')}
            </div>
          `;
        }

        if (gameState === 'pick-own') {
          html += `<div class="instruction">🎁 Pilih 1 koper utama untuk di-draft!</div>`;
        } else if (gameState === 'opening-3-1') {
          html += `<div class="instruction">🗑️ Buka ${3 - openedCases.length} koper lagi untuk mengeliminasi hero.</div>`;
        } else if (gameState === 'opening-3-2') {
          html += `<div class="instruction">🗑️ Banker ditolak! Buka ${6 - openedCases.length} koper lagi.</div>`;
        } else if (gameState === 'opening-1-1') {
          html += `<div class="instruction">🗑️ Banker ditolak! Buka 1 koper lagi.</div>`;
        } else if (gameState === 'opening-1-2') {
          html += `<div class="instruction">🗑️ Banker ditolak! Buka 1 koper terakhir.</div>`;
        }

        if (['pick-own', 'opening-3-1', 'opening-3-2', 'opening-1-1', 'opening-1-2'].includes(gameState)) {
          html += `<div class="cases-grid">`;
          cases.forEach(c => {
            const isSelected = c.id === selectedCase;
            const isOpened = openedCases.includes(c.id);
            const clickable = (gameState === 'pick-own') || (!isSelected && !isOpened);

            html += `
              <div class="case-card ${isSelected ? 'selected' : ''} ${isOpened ? 'opened' : ''}" onclick="${clickable ? `handleCaseClick(${c.id})` : ''}">
                ${isSelected ? '<div class="your-case-label">Koper Kamu</div>' : ''}
                ${isOpened ? `
                  <div class="player-info">
                    <div class="player-name">${getMedal(c.player.tier)}<br>${c.player.name}</div>
                    <div class="player-orig-role">${c.player.role}</div>
                  </div>
                ` : `
                  <div class="case-number">${c.id}</div>
                  <div class="koper-icon">💼</div>
                `}
              </div>
            `;
          });
          html += `</div>`;
          
          if(gameState !== 'pick-own') {
             html += renderAllHeroesSection();
          }
        }

        if (gameState.startsWith('banker-offer-')) {
          html += `
            <div class="interaction-panel">
              <h2>📞 THE BANKER'S OFFER!</h2>
              <p style="font-size: 1.1em; color: #cbd5e1; margin-bottom: 10px;">The Banker wants to make a deal!</p>
              
              <div class="hero-showcase">
                <div class="hero-name">${getMedal(bankerOffer.tier)} ${bankerOffer.name}</div>
                <div class="hero-stats">${bankerOffer.role} Role</div>
              </div>

              <div style="font-size: 0.9em; color: #cbd5e1; margin-top: 15px; margin-bottom: 25px;">
                (Kamu baru saja menyingkirkan ${latestEliminatedBatch.map(h => h.name).join(', ')})
              </div>

              <div class="offer-buttons">
                <button class="btn btn-deal" onclick="acceptDeal()">☑️ DEAL!</button>
                <button class="btn btn-no-deal" onclick="rejectDeal()">❌ NO DEAL!</button>
              </div>
            </div>
            
            <div class="cases-grid" style="opacity: 0.7; pointer-events: none; transform: scale(0.9);">
          `;
          cases.forEach(c => {
             html += `
              <div class="case-card ${c.id === selectedCase ? 'selected' : ''} ${openedCases.includes(c.id) ? 'opened' : ''}">
                ${c.id === selectedCase ? '<div class="your-case-label">Koper Kamu</div>' : ''}
                ${openedCases.includes(c.id) ? `
                  <div class="player-info">
                    <div class="player-name">${getMedal(c.player.tier)}<br>${c.player.name}</div>
                    <div class="player-orig-role">${c.player.role}</div>
                  </div>
                ` : `<div class="case-number">${c.id}</div><div class="koper-icon">💼</div>`}
              </div>`;
          });
          html += `</div>`;
          html += renderAllHeroesSection();
        }

        if (gameState === 'switch-decision') {
          const myCase = cases.find(c => c.id === selectedCase);
          const otherCase = cases.find(c => c.id !== selectedCase && !openedCases.includes(c.id));
          html += `
            <div class="interaction-panel">
              <h2 style="color: #ef4444; background: none; -webkit-text-fill-color: #ef4444;">🟥 FINAL DECISION</h2>
              <p style="font-size: 1.1em; color: #cbd5e1; margin-bottom: 20px;">Hanya tersisa 2 koper!</p>
              
              <div style="display: flex; justify-content: center; gap: 30px; margin-bottom: 30px;">
                <div class="case-card selected" style="cursor: default;"><div class="your-case-label">Koper Kamu</div><div class="case-number">${myCase.id}</div><div class="koper-icon">💼</div></div>
                <div class="case-card" style="cursor: default; border-color: #3b82f6;"><div class="your-case-label" style="background: #3b82f6;">Koper Lain</div><div class="case-number">${otherCase.id}</div><div class="koper-icon">💼</div></div>
              </div>

              <div class="offer-buttons">
                <button class="btn btn-switch" onclick="switchCase()">🔄 TUKAR KOPER LAIN</button>
                <button class="btn btn-deal" onclick="keepCase()">✅ TETAP KOPER SAYA</button>
              </div>
            </div>
            
            ${renderAllHeroesSection()}
          `;
        }

        if (gameState === 'round-result') {
          html += `
            <div class="interaction-panel">
              <h2>✨ HERO DIDAPATKAN! ✨</h2>
              <p style="font-size: 1.1em; color: #cbd5e1;">Slot ke-${currentRound} berhasil diisi oleh:</p>
              
              <div class="hero-showcase">
                <div class="hero-name">${getMedal(roundHeroFinal.tier)} ${roundHeroFinal.name}</div>
                <div class="hero-stats">${roundHeroFinal.role} Role</div>
              </div>
              
              <button class="btn btn-deal" onclick="nextRound()" style="margin-top: 30px; width: 100%; max-width: 350px;">
                ${currentRound === 5 ? 'TENTUKAN POSISI DRAFT 📊' : 'LANJUT RONDE BERIKUTNYA ➡️'}
              </button>
            </div>
            
            ${renderAllHeroesSection()}
          `;
        }

        if (gameState === 'final-result') {
          let baseScore = 0;
          let penaltyPercent = 0;

          ROLE_ORDER.forEach(role => {
            const hero = finalRoster[role];
            baseScore += getScore(hero.tier);
            const comp = getCompatibility(hero.role, role);
            if (comp === 'ok') penaltyPercent += 1.5;
            else if (comp === 'bad') penaltyPercent += 3.0;
          });

          let penaltyAmount = baseScore * (penaltyPercent / 100);
          let finalScore = Math.round(baseScore - penaltyAmount);
          let percentage = ((finalScore / 500) * 100).toFixed(1);

          html += `
            <div class="result-board">
              <div class="rank-box">
                <div class="rank-label">FINAL DRAFT RATING</div>
                <div class="rank-name" style="color: #10b981; text-shadow: 0 0 20px rgba(16,185,129,0.5); font-size: 4em; margin-bottom: 25px;">${percentage}%</div>
              </div>

              <div style="font-size: 1.1em; color: #cbd5e1; margin-bottom: 25px;">
                Base Score: ${baseScore} Pt / 500 Pt<br>
                Position Penalty: -${penaltyPercent}% (-${Math.round(penaltyAmount)} Pt)<br>
                <span style="font-weight: 900; color: #f59e0b; font-size: 1.5em; display: inline-block; margin-top: 10px;">Final Score: ${finalScore} Pt</span>
              </div>

              <div style="margin-top: 50px;">
                <h3 style="font-size: 1.5em; font-weight: 800; color: #fff; margin-bottom: 10px; text-transform: uppercase;">⭐ Your Final Draft</h3>
                <div style="font-size: 0.9em; opacity: 0.8; margin-bottom: 25px;">💡 Tap heroes to swap positions • Drag & drop on desktop</div>
                
                <div class="final-roster-grid">
                  ${ROLE_ORDER.map(role => {
                    const hero = finalRoster[role];
                    const comp = getCompatibility(hero.role, role);
                    const dotColor = getCompColor(comp);
                    const isSelected = selectedSlotForSwap === role;
                    
                    return `
                    <div class="final-card ${isSelected ? 'selected-swap' : ''}" 
                         draggable="true" 
                         ondragstart="handleDragStart('${role}')"
                         ondragover="handleDragOver(event)"
                         ondrop="handleDrop(event, '${role}')"
                         onclick="handleSlotTap('${role}')">
                      <div class="f-role">${role} <span class="dot" style="background-color:${dotColor}; box-shadow:0 0 8px ${dotColor}88;"></span></div>
                      <div class="f-name">${getMedal(hero.tier)}<br>${hero.name}</div>
                      <div style="font-size: 0.8em; opacity: 0.7; margin-top: 5px;">${hero.role}</div>
                    </div>
                  `}).join('')}
                </div>
                
                <div class="legend-box">
                    <div class="legend-item"><span class="dot perfect"></span> Green = Perfect position fit (0% penalty)</div>
                    <div class="legend-item"><span class="dot ok"></span> Yellow = Slightly off position (-1.5% penalty)</div>
                    <div class="legend-item"><span class="dot bad"></span> Red = Way off position (-3% penalty)</div>
                </div>
              </div>

              <div style="text-align: center; margin-top: 20px;">
                <button class="btn btn-switch" onclick="location.reload()" style="font-size: 1.2em; padding: 15px 50px;">🔄 MAIN LAGI</button>
              </div>
            </div>
          `;
        }

        root.innerHTML = html;
      }

      startRound();
    </script>
  </body>
</html>
